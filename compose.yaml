services:
  dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm ci && npm run start -- --host 0.0.0.0"
    ports:
      - "4200:4200"
    volumes:
      - .:/workspace
    environment:
      - NODE_ENV=development

  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
